services:
  # ===== POSTGRES =====
  postgres:
    image: postgres:16-alpine # Versión específica y más liviana
    container_name: dualeat_postgres
    environment:
      - POSTGRES_DB=DualEat
      - POSTGRES_USER=DualEat
      - POSTGRES_PASSWORD=DualEat21102504
      - PGDATA=/var/lib/postgresql/data/pgdata
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - dualeat-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U DualEat -d DualEat"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ===== PGADMIN =====
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: dualeat_pgadmin
    environment:
      - PGADMIN_DEFAULT_EMAIL=dualeat@gmail.com
      - PGADMIN_DEFAULT_PASSWORD=1234
      - PGADMIN_CONFIG_SERVER_MODE=False
      - PGADMIN_CONFIG_MASTER_PASSWORD_REQUIRED=False
    ports:
      - "5050:80"
    volumes:
      - pgadmin_data:/var/lib/pgadmin
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - dualeat-network
    restart: unless-stopped

  # ===== REDIS =====
  redis:
    image: redis:7-alpine
    container_name: dualeat_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - dualeat-network
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    restart: unless-stopped

  # ===== REDIS UI =====
  redis-commander:
    image: rediscommander/redis-commander:latest
    container_name: dualeat_redis_ui
    ports:
      - "8081:8081"
    environment:
      - REDIS_HOSTS=local:redis:6379
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - dualeat-network
    restart: unless-stopped

networks:
  dualeat-network:
    driver: bridge

volumes:
  postgres_data:
  pgadmin_data:
  redis_data: